<!DOCTYPE html>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .container { background: white; border-radius: 12px; padding: 24px 20px; width: 100%; max-width: 960px; margin: 0 auto; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 6px; color: #1a1a2e; }
    .subtitle { color: #666; margin-bottom: 18px; font-size: 0.9rem; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    label { font-size: 0.9rem; color: #444; white-space: nowrap; }
    input[type="number"] { width: 90px; padding: 10px 12px; font-size: 1rem; border: 1.5px solid #ccc; border-radius: 8px; outline: none; }
    input[type="number"]:focus { border-color: #3b82f6; }
    .gender-btn { padding: 8px 16px; border: 1.5px solid #ccc; border-radius: 8px; background: white; cursor: pointer; font-size: 0.9rem; }
    .gender-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .btn-generate { background: #3b82f6; color: white; border: none; padding: 11px 24px; font-size: 1rem; border-radius: 8px; cursor: pointer; margin-bottom: 16px; }
    .btn-generate:active { background: #2563eb; }
    .status { font-size: 0.85rem; color: #16a34a; margin-bottom: 12px; min-height: 18px; }
    .section-label { font-size: 0.8rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; margin-top: 16px; }
    .cols { display: flex; gap: 12px; }
    .col { flex: 1; }
    .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .col-label { font-weight: bold; font-size: 0.95rem; color: #333; }
    .btn-copy { background: #22c55e; color: white; border: none; padding: 6px 12px; font-size: 0.82rem; border-radius: 8px; cursor: pointer; }
    .btn-copy:disabled { background: #9ca3af; cursor: default; }
    .btn-copy:active { background: #16a34a; }
    textarea { width: 100%; height: 260px; padding: 10px; font-size: 0.88rem; font-family: 'Courier New', monospace; border: 1.5px solid #ccc; border-radius: 8px; resize: vertical; color: #333; }
    .copied-hint { font-size: 0.78rem; color: #16a34a; min-height: 16px; margin-top: 3px; }
    hr { border: none; border-top: 1.5px dashed #e5e7eb; margin: 18px 0 4px; }
  </style>
</head>
<body>

  <p class="subtitle">สร้างชื่อ-นามสกุลภาษาไทยและอังกฤษปลอมสำหรับ Test (ชื่อไทย-อังกฤษสอดคล้องกัน)</p>
  <div class="row">
    <label>จำนวน:</label>
    <input type="number" id="count" value="10" min="1" max="10000" inputmode="numeric">
    <label>เพศ:</label>
    <button class="gender-btn active" onclick="setGender('all', this)">ทั้งหมด</button>
    <button class="gender-btn" onclick="setGender('male', this)">ชาย</button>
    <button class="gender-btn" onclick="setGender('female', this)">หญิง</button>
  </div>
  <button class="btn-generate" onclick="generate()">▶ Generate</button>
  <div class="status" id="status"></div>

  <div class="section-label">🇹🇭 ภาษาไทย</div>
  <div class="cols">
    <div class="col">
      <div class="col-header"><span class="col-label">ชื่อ</span><button class="btn-copy" id="copyThFirst" onclick="copyCol('thFirst')" disabled>📋 Copy</button></div>
      <textarea id="outThFirst" readonly placeholder="ชื่อภาษาไทย..."></textarea>
      <div class="copied-hint" id="hintThFirst"></div>
    </div>
    <div class="col">
      <div class="col-header"><span class="col-label">นามสกุล</span><button class="btn-copy" id="copyThLast" onclick="copyCol('thLast')" disabled>📋 Copy</button></div>
      <textarea id="outThLast" readonly placeholder="นามสกุลภาษาไทย..."></textarea>
      <div class="copied-hint" id="hintThLast"></div>
    </div>
  </div>
  <hr>
  <div class="section-label">🇬🇧 ภาษาอังกฤษ (ทับศัพท์ตรงกับชื่อไทย)</div>
  <div class="cols">
    <div class="col">
      <div class="col-header"><span class="col-label">First Name</span><button class="btn-copy" id="copyEnFirst" onclick="copyCol('enFirst')" disabled>📋 Copy</button></div>
      <textarea id="outEnFirst" readonly placeholder="First Name..."></textarea>
      <div class="copied-hint" id="hintEnFirst"></div>
    </div>
    <div class="col">
      <div class="col-header"><span class="col-label">Last Name</span><button class="btn-copy" id="copyEnLast" onclick="copyCol('enLast')" disabled>📋 Copy</button></div>
      <textarea id="outEnLast" readonly placeholder="Last Name..."></textarea>
      <div class="copied-hint" id="hintEnLast"></div>
    </div>
  </div>
</div>

function setGender(g, btn) {
  gender = g;
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generate() {
  const count = parseInt(document.getElementById('count').value);
  if (isNaN(count) || count < 1) { alert('กรุณาใส่จำนวนที่ถูกต้อง'); return; }
  if (count > 10000) { alert('สูงสุด 10,000 รายการ'); return; }

  colData = { thFirst: [], thLast: [], enFirst: [], enLast: [] };

  for (let i = 0; i < count; i++) {
    let g = gender === 'all' ? (Math.random() < 0.5 ? 'male' : 'female') : gender;
    const namePair = getRandom(g === 'male' ? maleNames : femaleNames);
    const lastPair = getRandom(lastNamePairs);
    colData.thFirst.push(namePair[0]);
    colData.enFirst.push(namePair[1]);
    colData.thLast.push(lastPair[0]);
    colData.enLast.push(lastPair[1]);
  }

  document.getElementById('outThFirst').value = colData.thFirst.join('\n');
  document.getElementById('outThLast').value = colData.thLast.join('\n');
  document.getElementById('outEnFirst').value = colData.enFirst.join('\n');
  document.getElementById('outEnLast').value = colData.enLast.join('\n');

  ['copyThFirst','copyThLast','copyEnFirst','copyEnLast'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
  document.getElementById('status').textContent = `✅ สร้างแล้ว ${count.toLocaleString()} รายการ`;
}

function copyCol(key) {
  const text = colData[key].join('\n');
  const map = { thFirst:'hintThFirst', thLast:'hintThLast', enFirst:'hintEnFirst', enLast:'hintEnLast' };
  const hintId = map[key];
  const doIt = () => {
    document.getElementById(hintId).textContent = '✅ คัดลอกแล้ว!';
    setTimeout(() => { document.getElementById(hintId).textContent = ''; }, 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doIt).catch(() => fallback(text, doIt));
  } else { fallback(text, doIt); }
}

function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, 99999);
  document.execCommand('copy'); document.body.removeChild(ta); cb();
}

document.getElementById('count').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
